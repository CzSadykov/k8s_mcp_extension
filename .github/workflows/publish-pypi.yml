name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/k8s-mcp-extension/
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Verify release tag matches pyproject version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          TAG="${RELEASE_TAG#v}"
          if [ "${TAG}" != "${VERSION}" ]; then
            echo "::error title=Version mismatch::Release tag '${RELEASE_TAG}' (expected ${VERSION} after optional v-prefix) does not match project.version in pyproject.toml (${VERSION})."
            exit 1
          fi

      - name: Ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - name: Twine check
        run: uv run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
